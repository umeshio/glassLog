name: Add Post

on:
  repository_dispatch:
    types: [add-post]

jobs:
  add-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create post file
        uses: actions/github-script@v7
        with:
          script: |
            const { title, content, slug } = context.payload.client_payload;
            const date = new Date().toISOString().split('T')[0];
            const escaped = title.replace(/"/g, '\\"');
            const body = `---\ntitle: "${escaped}"\ndate: "${date}"\n---\n\n${content}\n`;
            const fs = require('fs');
            fs.writeFileSync(`src/content/posts/${slug}.md`, body, 'utf8');

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/
          git commit -m "post: ${{ github.event.client_payload.title }}"
          git push
